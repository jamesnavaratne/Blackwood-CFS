<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Blackwood CFS Directions Book — Draft</title>
<style>
:root {
  --bg:#ffffff; --panel:#ffffff; --text:#090909; --muted:#585858; --line:#d7d7d7; --soft:#f4f4f4;
  --accent:#0aa7ff; --accent2:#5fd3ff; --danger:#ff3b30; --star:#111;
  --shadow:0 0 0 1px rgba(0,0,0,.08), 0 10px 24px rgba(0,0,0,.08);
}
[data-theme="dark"] {
  --bg:#05070a; --panel:#0b0f14; --text:#f6f7fb; --muted:#aab3bd; --line:#27313d; --soft:#101720;
  --accent:#10aaff; --accent2:#6bdcff; --star:#fff;
  --shadow:0 0 0 1px rgba(16,170,255,.28), 0 0 24px rgba(16,170,255,.10);
}
* { box-sizing:border-box; }
html { scroll-behavior:smooth; }
body { margin:0; font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background:var(--bg); color:var(--text); overflow-x:hidden; }
.app { min-height:100vh; width:100%; max-width:100vw; overflow-x:hidden; }
.topbar { position:sticky; top:0; z-index:20; background:linear-gradient(180deg,var(--bg) 0%, color-mix(in srgb, var(--bg) 90%, transparent) 100%); backdrop-filter: blur(10px); border-bottom:1px solid var(--line); padding:10px 12px 12px; }
.brandrow { display:flex; align-items:center; justify-content:space-between; gap:10px; margin-bottom:10px; }
.brand { min-width:0; }
.kicker { font-size:11px; letter-spacing:.16em; text-transform:uppercase; color:var(--accent); font-weight:800; text-shadow:0 0 12px color-mix(in srgb, var(--accent) 60%, transparent); }
h1 { margin:2px 0 0; font-size:22px; line-height:1.05; letter-spacing:-.03em; }
.theme-toggle { display:flex; border:1px solid var(--accent); border-radius:999px; padding:3px; box-shadow:0 0 16px color-mix(in srgb, var(--accent) 25%, transparent); background:var(--panel); flex:0 0 auto; }
.theme-toggle button { border:0; border-radius:999px; background:transparent; color:var(--muted); padding:7px 10px; font-weight:800; font-size:12px; }
.theme-toggle button.active { background:var(--accent); color:#00131f; }
.header-actions { display:flex; align-items:center; gap:8px; flex:0 0 auto; }
.home-btn { width:42px; height:42px; display:grid; place-items:center; border:1px solid var(--accent); border-radius:999px; background:var(--panel); color:var(--accent); text-decoration:none; box-shadow:0 0 16px color-mix(in srgb, var(--accent) 22%, transparent); }
.home-btn svg { width:21px; height:21px; stroke:currentColor; stroke-width:2.4; fill:none; stroke-linecap:round; stroke-linejoin:round; }
.home-btn:active { transform:scale(.98); }
.searchwrap { position:relative; }
#search { width:100%; border:2px solid var(--accent); border-radius:18px; background:var(--panel); color:var(--text); font-size:20px; padding:15px 48px 15px 16px; outline:none; box-shadow:0 0 0 1px color-mix(in srgb, var(--accent) 20%, transparent), 0 0 22px color-mix(in srgb, var(--accent) 18%, transparent); }
#clearSearch { position:absolute; right:8px; top:50%; transform:translateY(-50%); width:36px; height:36px; border:0; border-radius:50%; background:var(--soft); color:var(--text); font-size:24px; line-height:1; }
.metaRow { display:flex; justify-content:space-between; align-items:center; color:var(--muted); font-size:12px; margin-top:8px; padding:0 2px; }
.content { padding:12px 10px 90px 44px; max-width:900px; margin:0 auto; width:100%; overflow-x:hidden; }
.section { scroll-margin-top:118px; margin-bottom:18px; }
.section-title { display:flex; align-items:center; gap:8px; font-size:13px; letter-spacing:.12em; text-transform:uppercase; color:var(--accent); font-weight:900; margin:14px 0 8px; padding-bottom:6px; border-bottom:1px solid var(--line); }
.result-list { display:grid; gap:7px; }
.street-row { width:100%; max-width:100%; border:1px solid var(--line); background:var(--panel); color:var(--text); border-radius:14px; padding:12px 14px; text-align:left; box-shadow:none; display:block; overflow:hidden; }
.street-row:active { transform:scale(.99); }
.street-main { display:block; min-width:0; }
.street-name { display:block; font-weight:900; font-size:17px; line-height:1.15; letter-spacing:.01em; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; overflow-wrap:normal; }
.street-subline { margin-top:5px; display:flex; align-items:center; gap:8px; min-width:0; }
.street-sub { color:var(--muted); font-size:12px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; min-width:0; flex:1; }
.badges { display:flex; gap:4px; flex-wrap:wrap; justify-content:flex-end; flex:0 0 auto; max-width:45%; }
.badge { font-size:9px; font-weight:900; color:var(--text); border:1px solid var(--line); border-radius:999px; padding:4px 5px; background:var(--soft); white-space:nowrap; }
.badge.accent { border-color:var(--accent); color:var(--accent); }
.letter-jump { position:fixed; left:4px; top:142px; bottom:10px; z-index:15; display:flex; flex-direction:column; justify-content:center; gap:3px; padding:5px 3px; border-radius:999px; background:color-mix(in srgb, var(--panel) 86%, transparent); border:1px solid var(--line); backdrop-filter: blur(8px); max-width:36px; }
.letter-jump a { color:var(--accent); text-decoration:none; font-size:13px; font-weight:950; width:28px; min-width:28px; height:20px; display:grid; place-items:center; border-radius:999px; border:1px solid var(--accent); background:transparent; line-height:1; box-shadow:0 0 8px color-mix(in srgb, var(--accent) 12%, transparent); }
.letter-jump a.search-jump { height:40px; width:30px; min-width:30px; font-size:17px; margin-bottom:5px; }
.letter-jump a.search-jump:not(.active) { opacity:1; }
.letter-jump a.search-jump:focus, .letter-jump a.search-jump:hover { color:#00131f; background:var(--accent); border-color:var(--accent); outline:none; }
.letter-jump a.active { color:var(--accent); background:transparent; border-color:var(--accent); }
.letter-jump a:not(.active) { opacity:.35; }
.letter-jump a.current, .letter-jump a:hover { color:#00131f; background:var(--accent); border-color:var(--accent); opacity:1; }
.empty { color:var(--muted); border:1px dashed var(--line); border-radius:14px; padding:18px; text-align:center; }
body.modal-open { overflow:hidden; }
.modal { position:fixed; inset:0; z-index:50; display:none; align-items:flex-start; justify-content:center; padding:calc(env(safe-area-inset-top, 0px) + 10px) 8px 8px; }
.modal.open { display:flex; }
.scrim { position:absolute; inset:0; background:rgba(0,0,0,.55); }
.card { position:relative; width:min(100%, 640px); max-height:calc(100dvh - env(safe-area-inset-top, 0px) - 18px); background:var(--panel); color:var(--text); border:1px solid var(--accent); border-radius:18px; box-shadow:0 0 32px color-mix(in srgb, var(--accent) 25%, transparent); overflow:auto; }
.card-head { position:sticky; top:0; background:var(--panel); border-bottom:1px solid var(--line); padding:12px 12px 10px; display:flex; gap:8px; align-items:flex-start; z-index:2; }
.card-title { flex:1; min-width:0; }
.card-title h2 { margin:0; font-size:22px; line-height:1.05; letter-spacing:-.03em; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.card-title .sub { color:var(--muted); margin-top:5px; font-size:13px; }
.iconbtn { border:1px solid var(--line); background:var(--soft); color:var(--text); border-radius:14px; min-width:42px; height:42px; font-size:22px; font-weight:900; }
.iconbtn.starred { background:var(--accent); color:#00131f; border-color:var(--accent); }
.card-body { padding:12px; }
.infoLine { display:flex; flex-wrap:wrap; gap:8px; margin-bottom:12px; }
.infoPill { border:1px solid var(--line); border-radius:999px; padding:7px 10px; font-size:12px; font-weight:900; color:var(--muted); }
.infoPill.accent { border-color:var(--accent); color:var(--accent); box-shadow:0 0 12px color-mix(in srgb, var(--accent) 16%, transparent); }
.book-copy { white-space:pre-wrap; font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace; font-size:17px; line-height:1.38; border:1px solid var(--line); background:var(--soft); border-radius:18px; padding:14px; letter-spacing:.01em; }
.book-copy strong { font-weight:900; color:var(--text); }
.source { color:var(--muted); font-size:12px; margin-top:12px; }
@media (min-width:720px) { .content { padding-left:56px; padding-right:18px; } .letter-jump { left:12px; } .modal { padding-top:24px; } }

@media (max-width:380px) {
  .topbar { padding-left:10px; padding-right:8px; }
  h1 { font-size:20px; }
  .theme-toggle button { padding:7px 8px; font-size:11px; }
  .header-actions { gap:6px; }
  .home-btn { width:40px; height:40px; }
  #search { font-size:18px; padding-left:14px; }
  .content { padding-left:42px; padding-right:8px; }
  .letter-jump { left:3px; max-width:34px; }
  .letter-jump a { width:26px; min-width:26px; height:19px; font-size:12px; }
  .letter-jump a.search-jump { height:36px; width:28px; min-width:28px; font-size:16px; }
  .card-title h2 { font-size:20px; }
  .book-copy { font-size:16px; padding:12px; line-height:1.34; }
}
</style>
</head>

</div>

const els = {
  body: document.body, directory: document.getElementById('directory'), jump: document.getElementById('letterJump'),
  search: document.getElementById('search'), clear: document.getElementById('clearSearch'), count: document.getElementById('countText'),
  modal: document.getElementById('modal'), scrim: document.getElementById('scrim'), close: document.getElementById('closeBtn'),
  cardName: document.getElementById('cardName'), cardSub: document.getElementById('cardSub'), cardInfo: document.getElementById('cardInfo'),
  bookCopy: document.getElementById('bookCopy'), sourceText: document.getElementById('sourceText'), starBtn: document.getElementById('starBtn'),
  lightBtn: document.getElementById('lightBtn'), darkBtn: document.getElementById('darkBtn')
};
let selected = null;
const favKey = 'blackwoodDirectionsFavourites.v1';
const themeKey = 'blackwoodDirectionsTheme.v1';
let favourites = new Set(JSON.parse(localStorage.getItem(favKey) || '[]'));
function saveFavs(){ localStorage.setItem(favKey, JSON.stringify([...favourites])); }
function setTheme(t){ els.body.dataset.theme=t; localStorage.setItem(themeKey,t); els.lightBtn.classList.toggle('active',t==='light'); els.darkBtn.classList.toggle('active',t==='dark'); }
setTheme(localStorage.getItem(themeKey) || 'dark');
els.lightBtn.onclick=()=>setTheme('light'); els.darkBtn.onclick=()=>setTheme('dark');
function norm(s){ return (s||'').toLowerCase().replace(/[^a-z0-9]+/g,' '); }
function searchable(e){ return norm([e.name, ...(e.areas||[]), e.directions, e.mapRef, e.code, e.source].join(' ')); }
function escapeHtml(s){ return String(s || '').replace(/[&<>"']/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch])); }
function regexEscape(s){ return String(s || '').replace(/[.*+?^${}()|[\]\\]/g, '\\$&'); }
function formatDirectionsHtml(entry){
  let html = escapeHtml(entry.directions || '');
  // Safe draft emphasis only: no text is changed, only visual emphasis is added.
  const terms = ['LEFT','RIGHT','STRAIGHT','VEER','FORK','DIRT','FIRE TRACK','SMALL LANE','BLOCKED'];
  terms.forEach(term => {
    html = html.replace(new RegExp('\\b' + regexEscape(term) + '\\b', 'g'), '<strong>' + term + '</strong>');
  });
  if(entry.name){
    html = html.replace(new RegExp(regexEscape(escapeHtml(entry.name)), 'g'), '<strong>' + escapeHtml(entry.name) + '</strong>');
  }
  return html;
}
DIRECTIONS.forEach(e=>e._search=searchable(e));
const letters = ['★', ...'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('')];
let currentLetter = '★';
function renderJump(activeLetters){
  const searchButton = `<a href="#" class="search-jump active" data-action="search" aria-label="Jump to search" title="Search">⌕</a>`;
  const letterButtons = letters.map(l => `<a href="#sec-${l==='★'?'fav':l}" data-letter="${l}" class="${activeLetters.has(l)?'active':''} ${currentLetter===l?'current':''}">${l}</a>`).join('');
  els.jump.innerHTML = searchButton + letterButtons;
  const searchJump = els.jump.querySelector('[data-action="search"]');
  if(searchJump){ searchJump.addEventListener('click', e => { e.preventDefault(); window.scrollTo({top:0, behavior:'smooth'}); setTimeout(()=>els.search.focus(), 180); }); }
  els.jump.querySelectorAll('a[data-letter]').forEach(a => a.addEventListener('click', () => { currentLetter = a.dataset.letter; paintCurrentLetter(); }));
}
function paintCurrentLetter(){
  els.jump.querySelectorAll('a[data-letter]').forEach(a => a.classList.toggle('current', a.dataset.letter === currentLetter));
}
function updateCurrentFromScroll(){
  const sections = [...document.querySelectorAll('.section')];
  let best = currentLetter;
  for(const sec of sections){
    if(sec.getBoundingClientRect().top < 150){
      best = sec.id === 'sec-fav' ? '★' : sec.id.replace('sec-','');
    }
  }
  if(best !== currentLetter){ currentLetter = best; paintCurrentLetter(); }
}
window.addEventListener('scroll', updateCurrentFromScroll, {passive:true});
function row(e){
  const sub = [e.displaySuburb, [e.mapRef,e.code].filter(Boolean).join(' · ')].filter(Boolean).join(' — ');
  const flags = (e.flags||[]).slice(0,2).map(f=>`<span class="badge accent">${escapeHtml(f)}</span>`).join('') + (favourites.has(e.id)?'<span class="badge accent">★</span>':'');
  return `<button class="street-row" data-id="${e.id}"><span class="street-main"><span class="street-name">${escapeHtml(e.name)}</span><span class="street-subline"><span class="street-sub">${escapeHtml(sub)}</span><span class="badges">${flags}</span></span></span></button>`;
}
function section(title, id, items){
  if(!items.length) return '';
  return `<section class="section" id="sec-${id}"><div class="section-title">${escapeHtml(title)}</div><div class="result-list">${items.map(row).join('')}</div></section>`;
}
function render(){
  const q=norm(els.search.value);
  const filtered = q ? DIRECTIONS.filter(e=>e._search.includes(q)) : DIRECTIONS;
  const favs = filtered.filter(e=>favourites.has(e.id));
  const active = new Set(); if(favs.length) active.add('★');
  let html = section('Favourites','fav',favs);
  for(const l of 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'){
    const items = filtered.filter(e=>(e.letter||'#')===l);
    if(items.length){ active.add(l); html += section(l,l,items); }
  }
  if(!filtered.length) html = '<div class="empty">No matching directions found.</div>';
  els.directory.innerHTML = html;
  els.count.textContent = `${filtered.length} direction${filtered.length===1?'':'s'}`;
  renderJump(active);
  document.querySelectorAll('.street-row').forEach(btn=>btn.onclick=()=>openEntry(btn.dataset.id));
  updateCurrentFromScroll();
}
function openEntry(id){
  selected = DIRECTIONS.find(e=>e.id===id); if(!selected) return;
  els.cardName.textContent = selected.name;
  els.cardSub.textContent = (selected.areas||[]).join(' · ');
  const info=[];
  if(selected.mapRef) info.push(`<span class="infoPill accent">Map ${escapeHtml(selected.mapRef)}</span>`);
  if(selected.code) info.push(`<span class="infoPill accent">${escapeHtml(selected.code)}</span>`);
  (selected.flags||[]).forEach(f=>info.push(`<span class="infoPill">${escapeHtml(f)}</span>`));
  els.cardInfo.innerHTML=info.join('');
  els.bookCopy.innerHTML = formatDirectionsHtml(selected);
  els.sourceText.textContent = 'Source: ' + selected.source;
  updateStar();
  els.modal.classList.add('open'); els.modal.setAttribute('aria-hidden','false'); document.body.classList.add('modal-open'); document.querySelector('.card').scrollTop = 0;
}
function updateStar(){
  const on = selected && favourites.has(selected.id);
  els.starBtn.textContent = on ? '★' : '☆';
  els.starBtn.classList.toggle('starred', !!on);
}
els.starBtn.onclick=()=>{ if(!selected) return; favourites.has(selected.id)?favourites.delete(selected.id):favourites.add(selected.id); saveFavs(); updateStar(); render(); };
function closeModal(){ els.modal.classList.remove('open'); els.modal.setAttribute('aria-hidden','true'); document.body.classList.remove('modal-open'); }
els.close.onclick=closeModal; els.scrim.onclick=closeModal; document.addEventListener('keydown',e=>{ if(e.key==='Escape') closeModal(); });
els.search.addEventListener('input', render); els.clear.onclick=()=>{ els.search.value=''; render(); els.search.focus(); };
function escapeHtml(s){ return String(s||'').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }
render();
</script>
